<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="14">
  <!-- Terminal transcript of a real run of examples/record_replay_demo.py
       followed by `agent-vcr diff`. Text content is copied verbatim from an
       actual execution; see docs/assets/demo.tape to re-record with vhs. -->
  <rect width="920" height="600" rx="10" fill="#0d1117"/>
  <rect width="920" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="920" height="14" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="460" y="22" fill="#8b949e" text-anchor="middle" font-size="12">agent-vcr — record, replay, catch drift</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> python examples/record_replay_demo.py out</text>
    <text x="24" y="86">[record] baseline cassette written: out/baseline.json</text>
    <text x="24" y="110">[record] answer: t-shirt and shorts, bring an umbrella</text>
    <text x="24" y="134">[replay] outputs byte-identical to recording: <tspan fill="#7ee787">True</tspan></text>
    <text x="24" y="158">[assert] v1 trajectory assertions <tspan fill="#7ee787">passed</tspan></text>
    <text x="24" y="182">[record] v2 cassette written: out/v2.json</text>
    <text x="24" y="206">[assert] drift <tspan fill="#f85149">caught</tspan> by tool_call_count:</text>
    <text x="24" y="230">    expected 'get_weather' to be called 1 time(s), got 2</text>
    <text x="24" y="254">[assert] drift <tspan fill="#f85149">caught</tspan> by max_steps:</text>
    <text x="24" y="278">    trajectory has 3 steps, exceeding budget of 2</text>
    <text x="24" y="302" fill="#7ee787">DEMO OK</text>
    <text x="24" y="342"><tspan fill="#7ee787">$</tspan> agent-vcr diff out/baseline.json out/v2.json</text>
    <text x="24" y="366" fill="#f85149">--- out/baseline.json (2 steps)</text>
    <text x="24" y="390" fill="#7ee787">+++ out/v2.json (3 steps)</text>
    <text x="24" y="414" fill="#7ee787">+ step 0: get_weather({"city": "Tokyo"})</text>
    <text x="24" y="438" fill="#d29922">~ step 0: get_weather (arguments/outcome differ)</text>
    <text x="24" y="462" fill="#8b949e">    result a: {"city": "Tokyo", "condition": "humid", "observation_id": 1, ...}</text>
    <text x="24" y="486" fill="#8b949e">    result b: {"city": "Tokyo", "condition": "humid", "observation_id": 3, ...}</text>
    <text x="24" y="510">  step 1: suggest_outfit</text>
    <text x="24" y="534" fill="#f85149">drift detected</text>
    <text x="24" y="558"><tspan fill="#7ee787">$</tspan> echo $?  <tspan fill="#8b949e"># non-zero exit: ready for CI</tspan></text>
    <text x="24" y="582" fill="#f85149">1</text>
  </g>
</svg>
